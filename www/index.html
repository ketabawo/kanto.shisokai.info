<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>始祖会 Owners Meeting</title>
  <meta name="description" content="始祖会は、GPZ1000RX・ZX-10オーナーによるオーナーズミーティングです。">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .logo img {
      height: 80px;
      width: auto;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 1rem;
      color: #666;
      margin-bottom: 60px;
      letter-spacing: 0.1em;
      font-family: Arial, sans-serif;
    }

    .regions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }

    .region-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-left: 4px solid #eb1000;
      border-radius: 4px;
      color: #333;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: bold;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .region-link:hover {
      background-color: #eb1000;
      border-color: #eb1000;
    }

    .region-link .arrow {
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="logo"><img src="logo.webp" alt="始祖会"></div>
  <p class="tagline">GPZ1000RX · ZX-10 Owners Meeting</p>

  <div class="regions">
    <a href="https://kanto.shisokai.info/" class="region-link">
      <span>関東</span>
      <span class="arrow">→</span>
    </a>
  </div>
</body>
</html>
